<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-green-500 font-mono overflow-hidden">
    <div id="chat-app" class="h-screen flex flex-col">
        <!-- Chat Header -->
        <header class="p-4 border-b border-green-900 flex justify-between items-center bg-black z-10">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div class="relative">
                    <img id="chat-user-img" src="/uploads/default-avatar.png" class="w-10 h-10 rounded-full border border-green-900 object-cover">
                    <span id="chat-user-status" class="status-dot absolute bottom-0 right-0 border border-black status-offline"></span>
                </div>
                <div>
                    <h1 id="chat-user-name" class="font-bold leading-tight">LOADING...</h1>
                    <p id="chat-typing-status" class="text-[10px] opacity-50 h-3"></p>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="call-btn" class="hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2z"/></svg>
                </button>
            </div>
        </header>

        <!-- Messages Area -->
        <main id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
            <!-- Messages will be injected here -->
        </main>

        <!-- Reply Preview -->
        <div id="reply-preview" class="hidden px-4 py-2 bg-green-900/10 border-t border-green-900 flex justify-between items-center">
            <div class="text-xs truncate">
                <span class="opacity-50">REPLYING_TO:</span>
                <span id="reply-text" class="italic"></span>
            </div>
            <button id="cancel-reply" class="text-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <!-- Input Area -->
        <footer class="p-4 border-t border-green-900 bg-black">
            <div class="flex items-end gap-2">
                <div class="flex gap-2 mb-2">
                    <label for="file-input" class="cursor-pointer hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.59a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </label>
                    <input type="file" id="file-input" class="hidden" multiple>
                    <button id="voice-btn" class="hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                    </button>
                </div>
                <div class="flex-1 relative">
                    <textarea id="message-input" rows="1" placeholder="TYPE_MSG..." class="w-full bg-black border border-green-900 p-3 pr-10 text-green-500 focus:border-green-500 outline-none resize-none max-h-32"></textarea>
                    <button id="emoji-btn" class="absolute right-3 bottom-3 opacity-50 hover:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                    </button>
                </div>
                <button id="send-btn" class="bg-green-500 text-black p-3 rounded-sm hover:bg-green-400 transition-colors mb-0.5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </footer>

        <!-- Call Overlay (Shared with index.html) -->
        <div id="call-overlay" class="hidden fixed inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-8">
            <div class="relative">
                <img id="call-avatar" src="/uploads/default-avatar.png" class="w-32 h-32 rounded-full border-4 border-green-500 animate-pulse">
                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-green-500 text-black text-[10px] px-2 py-0.5 font-bold">ENCRYPTED</div>
            </div>
            <h2 id="call-name" class="text-2xl mt-8 neon-text">UNKNOWN_NODE</h2>
            <p id="call-status" class="text-xs opacity-50 mt-2">ESTABLISHING_P2P_LINK...</p>
            
            <div class="flex gap-8 mt-16">
                <button id="end-call-btn" class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center hover:bg-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
                </button>
                <button id="accept-call-btn" class="hidden w-16 h-16 bg-green-500 rounded-full flex items-center justify-center hover:bg-green-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
