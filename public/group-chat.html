<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat | Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-green-500 font-mono overflow-hidden">
    <div id="chat-app" class="h-screen flex flex-col">
        <!-- Chat Header -->
        <header class="p-4 border-b border-green-900 flex justify-between items-center bg-black z-10">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <img id="group-img" src="/uploads/default-group.png" class="w-10 h-10 rounded-full border border-green-900 object-cover">
                <div>
                    <h1 id="group-name" class="font-bold leading-tight">LOADING...</h1>
                    <p id="group-members-count" class="text-[10px] opacity-50 h-3"></p>
                </div>
            </div>
        </header>

        <!-- Messages Area -->
        <main id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
        </main>

        <!-- Input Area -->
        <footer class="p-4 border-t border-green-900 bg-black">
            <div class="flex items-end gap-2">
                <div class="flex-1 relative">
                    <textarea id="message-input" rows="1" placeholder="TYPE_MSG..." class="w-full bg-black border border-green-900 p-3 pr-10 text-green-500 focus:border-green-500 outline-none resize-none max-h-32"></textarea>
                </div>
                <button id="send-btn" class="bg-green-500 text-black p-3 rounded-sm hover:bg-green-400 transition-colors mb-0.5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const groupId = urlParams.get('groupId');
        let messages = [];

        if (currentUser && groupId) {
            socket.emit('join', currentUser.id);
            socket.emit('joinGroup', groupId);
            loadGroupInfo();
            loadMessages();
        }

        async function loadGroupInfo() {
            const res = await apiFetch('/api/groups');
            const groups = await res.json();
            const group = groups.find(g => g._id === groupId);
            if (group) {
                document.getElementById('group-name').textContent = group.name;
                document.getElementById('group-img').src = getAvatar(group.image);
                document.getElementById('group-members-count').textContent = `${group.members.length} MEMBERS`;
            }
        }

        async function loadMessages() {
            const res = await apiFetch(`/api/groups/${groupId}/messages`);
            messages = await res.json();
            renderMessages();
            scrollToBottom();
        }

        function renderMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = messages.map(msg => {
                const isMe = msg.sender._id === currentUser.id || msg.sender === currentUser.id;
                return `
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        ${!isMe ? `<span class="text-[10px] opacity-30 mb-1 ml-2">${msg.sender.name}</span>` : ''}
                        <div class="message-bubble ${isMe ? 'message-sent' : 'message-received'}">
                            <p>${msg.content}</p>
                            <span class="text-[8px] opacity-30 mt-1 block">${formatDate(msg.createdAt)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('send-btn').onclick = () => {
            const content = document.getElementById('message-input').value.trim();
            if (!content) return;
            socket.emit('sendMessage', { groupId, content, type: 'text' });
            document.getElementById('message-input').value = '';
        };

        socket.on('newMessage', (msg) => {
            if (msg.group === groupId) {
                messages.push(msg);
                renderMessages();
                scrollToBottom();
            }
        });
    </script>
</body>
</html>
