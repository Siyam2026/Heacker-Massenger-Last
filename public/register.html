<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-green-500 font-mono flex items-center justify-center h-screen p-4">
    <div class="w-full max-w-md border border-green-500 p-8 bg-black/80 backdrop-blur-sm overflow-y-auto max-h-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold neon-text tracking-tighter">HACKER_MSG</h1>
            <p class="text-xs opacity-50 mt-2">NODE_INITIALIZATION</p>
        </div>

        <form id="register-form" class="space-y-4">
            <div class="flex flex-col items-center mb-4">
                <div class="relative group">
                    <img id="preview-img" src="/uploads/default-avatar.png" class="w-20 h-20 rounded-full border border-green-500 object-cover">
                    <label for="profilePic" class="absolute inset-0 flex items-center justify-center bg-black/50 opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity rounded-full text-[10px]">UPLOAD</label>
                    <input type="file" id="profilePic" class="hidden" accept="image/*">
                </div>
            </div>
            <div>
                <label class="block text-xs uppercase mb-1">FULL_NAME</label>
                <input type="text" id="name" required class="w-full bg-black border border-green-900 p-2 text-green-500 focus:border-green-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs uppercase mb-1">USERNAME</label>
                <input type="text" id="username" required class="w-full bg-black border border-green-900 p-2 text-green-500 focus:border-green-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs uppercase mb-1">ACCESS_KEY</label>
                <input type="password" id="password" required class="w-full bg-black border border-green-900 p-2 text-green-500 focus:border-green-500 outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-green-500 text-black font-bold p-3 hover:bg-green-400 transition-all mt-4">INITIALIZE</button>
        </form>

        <div class="mt-6 text-center">
            <a href="/login.html" class="text-xs hover:underline opacity-70">ALREADY_REGISTERED? LOGIN</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('register-form');
        const profilePicInput = document.getElementById('profilePic');
        const previewImg = document.getElementById('preview-img');

        profilePicInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => previewImg.src = e.target.result;
                reader.readAsDataURL(file);
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            if (profilePicInput.files[0]) {
                formData.append('profilePic', profilePicInput.files[0]);
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    alert(data.message || 'REGISTRATION_FAILED');
                }
            } catch (err) {
                alert('CONNECTION_ERROR');
            }
        });
    </script>
</body>
</html>
