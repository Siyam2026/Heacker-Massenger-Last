<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-green-500 font-mono overflow-hidden">
    <div id="app" class="h-screen flex flex-col">
        <!-- Top Bar -->
        <header class="p-4 border-b border-green-900 flex justify-between items-center bg-black z-10">
            <h1 class="text-xl font-bold tracking-tighter neon-text">HACKER_MSG</h1>
            <div class="flex gap-4">
                <button id="search-btn" class="hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </button>
                <button id="noti-btn" class="relative hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                    <span id="noti-badge" class="hidden absolute -top-1 -right-1 bg-red-600 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">0</span>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto p-4 pb-20">
            <!-- Friend List / Groups -->
            <div id="home-view">
                <div class="mb-6">
                    <h2 class="text-xs uppercase opacity-50 mb-4 tracking-widest">Active_Nodes</h2>
                    <div id="friends-list" class="space-y-4">
                        <!-- Friends will be injected here -->
                        <div class="animate-pulse flex items-center gap-4">
                            <div class="w-12 h-12 bg-green-900/20 rounded-full"></div>
                            <div class="flex-1 space-y-2">
                                <div class="h-4 bg-green-900/20 rounded w-1/3"></div>
                                <div class="h-3 bg-green-900/20 rounded w-1/2"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xs uppercase opacity-50 tracking-widest">Clusters</h2>
                        <button id="create-group-btn" class="text-xs border border-green-500 px-2 py-1 hover:bg-green-500 hover:text-black transition-all">NEW_CLUSTER</button>
                    </div>
                    <div id="groups-list" class="space-y-4">
                        <!-- Groups will be injected here -->
                    </div>
                </div>
            </div>

            <!-- Search View -->
            <div id="search-view" class="hidden">
                <div class="relative mb-6">
                    <input type="text" id="search-input" placeholder="SEARCH_USERNAME..." class="w-full bg-black border border-green-500 p-3 text-green-500 focus:outline-none focus:ring-1 focus:ring-green-400 placeholder-green-900">
                    <div id="search-results" class="mt-4 space-y-4"></div>
                </div>
            </div>

            <!-- Notifications View -->
            <div id="notifications-view" class="hidden">
                <h2 class="text-xs uppercase opacity-50 mb-4 tracking-widest">Incoming_Requests</h2>
                <div id="notifications-list" class="space-y-4"></div>
            </div>

            <!-- Profile View -->
            <div id="profile-view" class="hidden">
                <div class="flex flex-col items-center gap-6">
                    <div class="relative group">
                        <img id="profile-img" src="/uploads/default-avatar.png" class="w-32 h-32 rounded-full border-2 border-green-500 object-cover">
                        <label for="profile-pic-input" class="absolute inset-0 flex items-center justify-center bg-black/50 opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity rounded-full">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </label>
                        <input type="file" id="profile-pic-input" class="hidden" accept="image/*">
                    </div>
                    <div class="w-full space-y-4">
                        <div>
                            <label class="text-xs opacity-50">DISPLAY_NAME</label>
                            <input type="text" id="profile-name" class="w-full bg-black border border-green-900 p-3 focus:border-green-500 outline-none">
                        </div>
                        <div>
                            <label class="text-xs opacity-50">NEW_PASSWORD</label>
                            <input type="password" id="profile-pass" placeholder="LEAVE_BLANK_TO_KEEP" class="w-full bg-black border border-green-900 p-3 focus:border-green-500 outline-none">
                        </div>
                        <button id="save-profile-btn" class="w-full bg-green-500 text-black font-bold p-3 hover:bg-green-400 transition-colors">UPDATE_PROTOCOL</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-green-900 flex justify-around p-4 z-10">
            <button class="nav-item active" data-view="home">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </button>
            <button class="nav-item" data-view="notifications">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            </button>
            <button class="nav-item" data-view="profile">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button id="logout-btn" class="text-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </nav>

        <!-- Modals -->
        <div id="group-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
            <div class="bg-black border border-green-500 w-full max-w-md p-6 space-y-4">
                <h2 class="text-xl neon-text">INIT_CLUSTER</h2>
                <input type="text" id="group-name-input" placeholder="CLUSTER_NAME..." class="w-full bg-black border border-green-900 p-3 outline-none focus:border-green-500">
                <div class="max-h-48 overflow-y-auto border border-green-900 p-2" id="group-members-select">
                    <!-- Friends to select will be here -->
                </div>
                <div class="flex gap-4">
                    <button id="cancel-group-btn" class="flex-1 border border-green-900 p-3 hover:bg-green-900/20">ABORT</button>
                    <button id="confirm-group-btn" class="flex-1 bg-green-500 text-black font-bold p-3 hover:bg-green-400">EXECUTE</button>
                </div>
            </div>
        </div>

        <!-- Call Overlay -->
        <div id="call-overlay" class="hidden fixed inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-8">
            <div class="relative">
                <img id="call-avatar" src="/uploads/default-avatar.png" class="w-32 h-32 rounded-full border-4 border-green-500 animate-pulse">
                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-green-500 text-black text-[10px] px-2 py-0.5 font-bold">ENCRYPTED</div>
            </div>
            <h2 id="call-name" class="text-2xl mt-8 neon-text">UNKNOWN_NODE</h2>
            <p id="call-status" class="text-xs opacity-50 mt-2">ESTABLISHING_P2P_LINK...</p>
            
            <div class="flex gap-8 mt-16">
                <button id="end-call-btn" class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center hover:bg-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
                </button>
                <button id="accept-call-btn" class="hidden w-16 h-16 bg-green-500 rounded-full flex items-center justify-center hover:bg-green-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
